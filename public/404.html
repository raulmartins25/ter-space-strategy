<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          "/?p=" +
          encodeURIComponent(l.pathname + l.search) +
          "&h=" +
          encodeURIComponent(l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
